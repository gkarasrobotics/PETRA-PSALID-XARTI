<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Rock Paper Scissors LIVE | Gkaras Robotics</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 10% 30%, #0b1a2e, #07121f);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, sans-serif;
      padding: 12px;
    }

    .game-container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      height: auto;
      min-height: 96vh;
      display: flex;
      flex-direction: column;
    }

    .game-card {
      background: rgba(18, 28, 40, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 1.5rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* header & stamp */
    .title-stamp-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 0.2rem;
    }
    .game-title {
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 800;
      background: linear-gradient(135deg, #FFE6B0, #FFB347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .stamp {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #FFD966;
      border: 1px solid #FFD966;
      font-family: monospace;
    }

    /* room section */
    .room-section {
      background: rgba(255,255,240,0.1);
      border-radius: 1.8rem;
      padding: 1rem;
      text-align: center;
    }
    .room-control {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }
    .room-control input {
      flex: 2;
      min-width: 150px;
      padding: 0.8rem 1rem;
      border-radius: 3rem;
      border: none;
      background: #f0f3f8;
      font-size: 1rem;
      text-align: center;
      font-weight: bold;
    }
    .room-control button {
      background: #FFB347;
      border: none;
      padding: 0.8rem 1.4rem;
      border-radius: 3rem;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.1s linear;
      color: #1a2a3a;
    }
    .room-control button:active { transform: scale(0.96); }
    .info-text {
      font-size: 0.85rem;
      margin-top: 12px;
      color: #FFE5B4;
    }
    .status-badge {
      background: #4CAF50;
      color: white;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: bold;
      margin-left: 8px;
    }

    /* players panel */
    .players-panel {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 1.8rem;
      padding: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .player-name-field {
      flex: 1;
    }
    .player-name-field label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #FFD966;
      display: block;
      margin-bottom: 5px;
    }
    .player-name-field input {
      width: 100%;
      padding: 0.8rem;
      border-radius: 2rem;
      border: none;
      background: #1e2a36;
      color: white;
      font-weight: bold;
      text-align: center;
      font-size: 1rem;
    }

    /* score panel */
    .score-panel {
      display: flex;
      gap: 1.2rem;
      margin: 0.5rem 0;
    }
    .score-card {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 2rem;
      flex: 1;
      padding: 1rem 0.5rem;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    .score-label {
      font-size: 1.3rem;
      font-weight: bold;
      color: #FFE5B4;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .score-value {
      font-size: 3rem;
      font-weight: 800;
      background: #00000066;
      display: inline-block;
      width: 100px;
      border-radius: 60px;
      color: #F9D56E;
      line-height: 1.2;
    }

    /* duel area */
    .duel-area {
      display: flex;
      gap: 1rem;
      margin: 0.5rem 0;
    }
    .choice-box {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 1.8rem;
      padding: 1rem;
      text-align: center;
      flex: 1;
    }
    .choice-label {
      font-weight: bold;
      color: #FFD966;
      font-size: 1rem;
      margin-bottom: 8px;
    }
    .choice-display {
      font-size: 2rem;
      font-weight: bold;
      background: #0f1a24cc;
      border-radius: 2rem;
      padding: 1rem;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #fff2d7;
    }

    .result-message {
      background: #1e2f3fcc;
      border-radius: 2rem;
      padding: 1rem;
      text-align: center;
      font-weight: bold;
      font-size: 1.1rem;
      color: #F9EEC1;
    }

    /* action buttons */
    .choices-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 0.5rem 0;
    }
    .choice-btn {
      background: white;
      border: none;
      border-radius: 3rem;
      padding: 1rem 0.8rem;
      font-size: 1.4rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      flex: 1;
      transition: 0.08s linear;
      box-shadow: 0 8px 14px rgba(0, 0, 0, 0.3);
    }
    .choice-btn:active { transform: scale(0.96); }
    .choice-btn.rock { background: #FFB08C; border-bottom: 5px solid #C25D2E; }
    .choice-btn.paper { background: #A3D0FF; border-bottom: 5px solid #3A7CA5; }
    .choice-btn.scissors { background: #E2BAFF; border-bottom: 5px solid #8C5E9E; }
    .choice-btn span:last-child { font-size: 1.2rem; }

    .reset-btn {
      background: #FFB347;
      border: none;
      width: 100%;
      padding: 1rem;
      border-radius: 3rem;
      font-weight: bold;
      font-size: 1.1rem;
      margin-top: 0.5rem;
      cursor: pointer;
    }

    @media (max-width: 650px) {
      .game-card { padding: 1rem; gap: 0.8rem; }
      .score-value { width: 70px; font-size: 2.2rem; }
      .choice-display { font-size: 1.4rem; padding: 0.7rem; min-height: 70px; }
      .choice-btn { padding: 0.8rem 0.5rem; font-size: 1.2rem; }
      .choice-btn span:last-child { font-size: 1rem; }
      .score-label { font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="game-card">
    <div class="title-stamp-row">
      <div class="game-title">🪨 Πέτρα · Ψαλίδι · Χαρτί ✂️</div>
      <div class="stamp">⚡ gkaras robotics</div>
    </div>

    <!-- Room Management -->
    <div class="room-section">
      <div><strong>🔗 ΔΩΜΑΤΙΟ LIVE ΜΑΧΗΣ</strong> <span id="connectionStatus" class="status-badge">● Αποσυνδεδεμένο</span></div>
      <div class="room-control">
        <input type="text" id="roomIdInput" placeholder="Κωδικός Δωματίου (π.χ. Battle1)">
        <button id="createRoomBtn">✨ Δημιουργία / Είσοδος</button>
        <button id="leaveRoomBtn" style="background:#7f8c8d;">↪︎ Έξοδος</button>
      </div>
      <div id="roomInfo" class="info-text">⚡ Δημιούργησε ή πληκτρολόγησε έναν κοινό κωδικό με τον φίλο σου.</div>
    </div>

    <!-- Name Inputs -->
    <div class="players-panel">
      <div class="player-name-field"><label>🧑 ΤΟ ΟΝΟΜΑ ΜΟΥ</label><input type="text" id="myNameInput" placeholder="Το όνομά σου"></div>
      <div class="player-name-field"><label>🤝 ΑΝΤΙΠΑΛΟΣ</label><input type="text" id="opponentNameInput" value="Αναμονή..." disabled style="background:#e9ecef; color:#333;"></div>
    </div>

    <!-- Score Panel -->
    <div class="score-panel">
      <div class="score-card"><div class="score-label" id="myScoreLabel">🧑 ΕΓΩ</div><div class="score-value" id="myScore">0</div></div>
      <div class="score-card"><div class="score-label" id="opponentScoreLabel">🤖 ΑΝΤΙΠΑΛΟΣ</div><div class="score-value" id="opponentScore">0</div></div>
    </div>

    <!-- Duel Area -->
    <div class="duel-area">
      <div class="choice-box"><div class="choice-label" id="player1Label">Η ΕΠΙΛΟΓΗ ΜΟΥ</div><div class="choice-display" id="myChoiceDisplay">—</div></div>
      <div class="choice-box"><div class="choice-label" id="player2Label">ΕΠΙΛΟΓΗ ΑΝΤΙΠΑΛΟΥ</div><div class="choice-display" id="opponentChoiceDisplay">❓ Κρυφή</div></div>
    </div>
    <div id="resultMessage" class="result-message">✨ Μπες σε δωμάτιο για να παίξεις ✨</div>

    <!-- Action Buttons -->
    <div class="choices-row">
      <button class="choice-btn rock" data-choice="rock">✊ <span>Πέτρα</span></button>
      <button class="choice-btn paper" data-choice="paper">✋ <span>Χαρτί</span></button>
      <button class="choice-btn scissors" data-choice="scissors">✌️ <span>Ψαλίδι</span></button>
    </div>
    <button id="resetGameBtn" class="reset-btn">🔄 Επαναφορά Σκορ Δωματίου</button>
  </div>
</div>

<script>
  // ------------------- FIREBASE CONFIGURATION -------------------
  // Αντικατέστησε τα παρακάτω με τα δικά σου στοιχεία από το Firebase Console
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    databaseURL: "YOUR_DATABASE_URL",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  
  // ------------------- Game State -------------------
  let currentRoom = null;
  let myPlayerId = null;           // "player1" ή "player2"
  let myName = "Παίκτης";
  let opponentName = "Αντίπαλος";
  let myScore = 0;
  let opponentScore = 0;
  let myChoice = null;
  let opponentChoice = null;
  let roundActive = false;
  
  // DOM elements
  const connectionSpan = document.getElementById('connectionStatus');
  const roomIdInput = document.getElementById('roomIdInput');
  const createRoomBtn = document.getElementById('createRoomBtn');
  const leaveRoomBtn = document.getElementById('leaveRoomBtn');
  const roomInfoDiv = document.getElementById('roomInfo');
  const myNameInput = document.getElementById('myNameInput');
  const opponentNameInput = document.getElementById('opponentNameInput');
  const myScoreSpan = document.getElementById('myScore');
  const opponentScoreSpan = document.getElementById('opponentScore');
  const myChoiceDisplay = document.getElementById('myChoiceDisplay');
  const opponentChoiceDisplay = document.getElementById('opponentChoiceDisplay');
  const resultMsgDiv = document.getElementById('resultMessage');
  const myScoreLabel = document.getElementById('myScoreLabel');
  const opponentScoreLabel = document.getElementById('opponentScoreLabel');
  const resetGameBtn = document.getElementById('resetGameBtn');
  
  const choicesMap = {
    rock: { name: "Πέτρα", emoji: "✊", beats: "scissors" },
    paper: { name: "Χαρτί", emoji: "✋", beats: "rock" },
    scissors: { name: "Ψαλίδι", emoji: "✌️", beats: "paper" }
  };
  
  function updateUI() {
    myScoreSpan.innerText = myScore;
    opponentScoreSpan.innerText = opponentScore;
    myScoreLabel.innerHTML = `🧑 ${myName}`;
    opponentScoreLabel.innerHTML = `🤝 ${opponentName}`;
    opponentNameInput.value = opponentName;
    if (myChoice) {
      myChoiceDisplay.innerHTML = `${choicesMap[myChoice].emoji} ${choicesMap[myChoice].name}`;
    } else {
      myChoiceDisplay.innerHTML = "—";
    }
    if (opponentChoice && roundActive === false) {
      opponentChoiceDisplay.innerHTML = `${choicesMap[opponentChoice].emoji} ${choicesMap[opponentChoice].name}`;
    } else if (opponentChoice && roundActive === true) {
      opponentChoiceDisplay.innerHTML = "❓ Κρυφή";
    } else {
      opponentChoiceDisplay.innerHTML = "❓ Κρυφή";
    }
  }
  
  function determineWinner(choiceA, choiceB) {
    if (choiceA === choiceB) return 'tie';
    if (choicesMap[choiceA].beats === choiceB) return 'playerA';
    return 'playerB';
  }
  
  function evaluateRound(p1Choice, p2Choice, p1Score, p2Score) {
    const winner = determineWinner(p1Choice, p2Choice);
    let newP1Score = p1Score;
    let newP2Score = p2Score;
    let message = "";
    const p1Name = (myPlayerId === 'player1') ? myName : opponentName;
    const p2Name = (myPlayerId === 'player1') ? opponentName : myName;
    if (winner === 'tie') {
      message = `🤝 Ισοπαλία! ${choicesMap[p1Choice].emoji} & ${choicesMap[p2Choice].emoji}`;
    } else if (winner === 'playerA') {
      newP1Score++;
      message = `🏆 Νίκησε ο ${p1Name}! ${choicesMap[p1Choice].emoji} νικά ${choicesMap[p2Choice].emoji}`;
    } else {
      newP2Score++;
      message = `🏆 Νίκησε ο ${p2Name}! ${choicesMap[p2Choice].emoji} νικά ${choicesMap[p1Choice].emoji}`;
    }
    return { newP1Score, newP2Score, message };
  }
  
  function sendMyChoice(choice) {
    if (!currentRoom || !myPlayerId) {
      resultMsgDiv.innerHTML = "❌ Μπες πρώτα σε κάποιο δωμάτιο.";
      return;
    }
    myChoice = choice;
    const updates = {};
    updates[`rooms/${currentRoom}/players/${myPlayerId}/choice`] = choice;
    updates[`rooms/${currentRoom}/players/${myPlayerId}/name`] = myName;
    database.ref().update(updates);
    resultMsgDiv.innerHTML = `✅ Επέλεξες ${choicesMap[choice].name}. Περιμένουμε τον αντίπαλο...`;
    updateUI();
  }
  
  function listenToRoom(roomId) {
    const roomRef = database.ref(`rooms/${roomId}`);
    roomRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      if (data.player1 && data.player1.score !== undefined) {
        if (myPlayerId === 'player1') myScore = data.player1.score;
        else opponentScore = data.player1.score;
      }
      if (data.player2 && data.player2.score !== undefined) {
        if (myPlayerId === 'player2') myScore = data.player2.score;
        else opponentScore = data.player2.score;
      }
      if (data.player1 && data.player1.name) {
        if (myPlayerId === 'player1') myName = data.player1.name;
        else opponentName = data.player1.name;
      }
      if (data.player2 && data.player2.name) {
        if (myPlayerId === 'player2') myName = data.player2.name;
        else opponentName = data.player2.name;
      }
      const p1Choice = data.player1?.choice;
      const p2Choice = data.player2?.choice;
      if (myPlayerId === 'player1') {
        if (p1Choice) myChoice = p1Choice;
        opponentChoice = p2Choice;
      } else {
        opponentChoice = p1Choice;
        if (p2Choice) myChoice = p2Choice;
      }
      if (p1Choice && p2Choice && roundActive === false) {
        roundActive = true;
        const p1ScoreOld = (data.player1?.score) || 0;
        const p2ScoreOld = (data.player2?.score) || 0;
        const { newP1Score, newP2Score, message } = evaluateRound(p1Choice, p2Choice, p1ScoreOld, p2ScoreOld);
        const cleanUpdates = {};
        cleanUpdates[`rooms/${roomId}/player1/choice`] = null;
        cleanUpdates[`rooms/${roomId}/player2/choice`] = null;
        cleanUpdates[`rooms/${roomId}/player1/score`] = newP1Score;
        cleanUpdates[`rooms/${roomId}/player2/score`] = newP2Score;
        database.ref().update(cleanUpdates);
        resultMsgDiv.innerHTML = message;
        roundActive = false;
        myChoice = null;
        opponentChoice = null;
        updateUI();
      } else {
        updateUI();
      }
    });
  }
  
  function joinOrCreateRoom(roomId) {
    if (!roomId || roomId.trim() === "") {
      alert("Παρακαλώ βάλε ένα όνομα δωματίου");
      return;
    }
    currentRoom = roomId.trim();
    const myNameValue = myNameInput.value.trim();
    if (myNameValue !== "") myName = myNameValue;
    else myName = "Παίκτης";
    
    const roomRef = database.ref(`rooms/${currentRoom}`);
    roomRef.once('value', (snapshot) => {
      const data = snapshot.val();
      let assignedId = null;
      if (!data) {
        assignedId = 'player1';
        roomRef.set({
          player1: { name: myName, score: 0, choice: null },
          player2: { name: "Αναμονή...", score: 0, choice: null }
        });
      } else if (!data.player1 || !data.player1.name || data.player1.name === "Αναμονή...") {
        assignedId = 'player1';
        roomRef.child('player1').set({ name: myName, score: data.player1?.score || 0, choice: null });
      } else if (!data.player2 || !data.player2.name || data.player2.name === "Αναμονή...") {
        assignedId = 'player2';
        roomRef.child('player2').set({ name: myName, score: data.player2?.score || 0, choice: null });
      } else {
        alert("Το δωμάτιο είναι ήδη γεμάτο. Δημιούργησε ένα νέο.");
        return;
      }
      myPlayerId = assignedId;
      connectionSpan.innerHTML = "● Συνδεδεμένο";
      roomInfoDiv.innerHTML = `🔒 Είσαι στο δωμάτιο: <strong>${currentRoom}</strong> ως ${myPlayerId === 'player1' ? 'Παίκτης 1' : 'Παίκτης 2'}. Μοιράσου τον κωδικό με τον φίλο σου!`;
      myScore = 0;
      opponentScore = 0;
      myChoice = null;
      opponentChoice = null;
      roundActive = false;
      listenToRoom(currentRoom);
      updateUI();
    });
  }
  
  function leaveRoom() {
    if (!currentRoom) return;
    if (myPlayerId) {
      database.ref(`rooms/${currentRoom}/players/${myPlayerId}`).remove();
    }
    database.ref(`rooms/${currentRoom}`).off();
    currentRoom = null;
    myPlayerId = null;
    myName = "Παίκτης";
    opponentName = "Αντίπαλος";
    myScore = 0;
    opponentScore = 0;
    myChoice = null;
    opponentChoice = null;
    connectionSpan.innerHTML = "● Αποσυνδεδεμένο";
    roomInfoDiv.innerHTML = "⚡ Δημιούργησε ή πληκτρολόγησε έναν κοινό κωδικό με τον φίλο σου.";
    opponentNameInput.value = "Αναμονή...";
    updateUI();
    resultMsgDiv.innerHTML = "✨ Βγήκες από το δωμάτιο. Μπες ξανά για να παίξεις ✨";
  }
  
  function resetScores() {
    if (!currentRoom) return;
    const updates = {};
    updates[`rooms/${currentRoom}/player1/score`] = 0;
    updates[`rooms/${currentRoom}/player2/score`] = 0;
    database.ref().update(updates);
    resultMsgDiv.innerHTML = "📊 Τα σκορ μηδενίστηκαν! Ξεκινήστε νέο γύρο.";
  }
  
  createRoomBtn.addEventListener('click', () => {
    const roomVal = roomIdInput.value.trim();
    if (roomVal === "") {
      alert("Γράψε ένα όνομα δωματίου (π.χ. BattleRoom)");
      return;
    }
    joinOrCreateRoom(roomVal);
  });
  leaveRoomBtn.addEventListener('click', leaveRoom);
  resetGameBtn.addEventListener('click', resetScores);
  myNameInput.addEventListener('change', () => {
    if (currentRoom && myPlayerId) {
      const updates = {};
      updates[`rooms/${currentRoom}/players/${myPlayerId}/name`] = myNameInput.value.trim() || "Παίκτης";
      database.ref().update(updates);
    }
  });
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const choice = e.currentTarget.getAttribute('data-choice');
      if (!currentRoom) {
        resultMsgDiv.innerHTML = "⚠️ Μπες πρώτα σε ένα δωμάτιο.";
        return;
      }
      sendMyChoice(choice);
    });
  });
  
  updateUI();
</script>
</body>
</html>
